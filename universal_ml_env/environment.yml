# ============================================================
# environment.yml  —  Conda environment (alternative to venv)
#
# Usage:
#   conda env create -f environment.yml
#   conda activate ml_env
#   python colab_setup.py --skip-system
# ============================================================

name: ml_env

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - numpy=1.26.4
  - scipy=1.13.1
  - pandas=2.2.2
  - matplotlib=3.9.0
  - Pillow=10.3.0
  - scikit-learn=1.5.0
  - h5py=3.11.0
  - cmake
  - ninja
  - git
  - curl
  - ffmpeg
  - libsndfile

  - pip:
    # PyTorch (CUDA 12 — change cu121 → cpu for CPU-only)
    - torch==2.3.1
    - torchvision==0.18.1
    - torchaudio==2.3.1
    - torchtext==0.18.0
    - --extra-index-url https://download.pytorch.org/whl/cu121

    # TensorFlow
    - tensorflow==2.16.1
    - keras==3.3.3
    - tensorflow-hub==0.16.1
    - tensorflow-datasets==4.9.4
    - tensorflow-addons==0.23.0

    # ML
    - xgboost==2.0.3
    - lightgbm==4.3.0
    - catboost==1.2.5
    - shap==0.45.1
    - optuna==3.6.1

    # NLP
    - transformers==4.42.4
    - tokenizers==0.19.1
    - datasets==2.20.0
    - accelerate==0.31.0
    - sentence-transformers==3.0.1
    - spacy==3.7.5
    - nltk==3.8.1
    - sentencepiece==0.2.0

    # CV
    - opencv-python-headless==4.10.0.84
    - albumentations==1.4.10
    - timm==1.0.3
    - ultralytics==8.2.0

    # Audio
    - librosa==0.10.2
    - soundfile==0.12.1
    - pydub==0.25.1
    - speechbrain==1.0.0

    # RL
    - gymnasium==0.29.1
    - stable-baselines3==2.3.2

    # LLM
    - peft==0.11.1
    - trl==0.9.4
    - langchain==0.2.5
    - faiss-cpu==1.8.0

    # DL utils
    - torchmetrics==1.4.0
    - lightning==2.3.3
    - timm==1.0.3
    - einops==0.8.0
    - mlflow==2.14.1
    - wandb==0.17.3

    # Jupyter
    - jupyterlab==4.2.3
    - ipykernel==6.29.4
    - ipywidgets==8.1.3

    # Utils
    - numba==0.60.0
    - llvmlite==0.43.0
    - tqdm==4.66.4
    - rich==13.7.1
    - python-dotenv==1.0.1
    - plotly==5.22.0
