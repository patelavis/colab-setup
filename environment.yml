# ============================================================
# environment.yml  —  Conda environment  (Colab Mirror)
#
# Mirrors: us-docker.pkg.dev/colab-images/public/runtime
#
# Usage:
#   conda env create -f environment.yml
#   conda activate colab_mirror
#   python colab_setup.py --skip-system    ← installs pip packages
# ============================================================

name: colab_mirror

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python — matches Colab runtime ──────────────────────────
  - python=3.12
  - pip

  # ── Conda-managed base (faster + better binary compat) ──────
  - numpy=1.26.4          # CRITICAL: keep < 2.0
  - scipy=1.15.3
  - pandas=2.2.2
  - matplotlib=3.10.0
  - Pillow=11.2.1
  - scikit-learn=1.6.1
  - h5py=3.13.0
  - cmake
  - ninja
  - git
  - curl
  - ffmpeg                 # codec backend for torchaudio
  - libsndfile             # soundfile backend
  - portaudio              # sounddevice / pyaudio

  - pip:
    # ── PyTorch family — GPU (swap cu121→cpu for CPU-only) ────
    - torch==2.5.1
    - torchvision==0.20.1
    - torchaudio==2.5.1
    - torchtext==0.18.0
    - --extra-index-url https://download.pytorch.org/whl/cu121

    # ── TensorFlow (exact Colab version) ─────────────────────
    - tensorflow==2.18.0
    - keras==3.8.0
    - tensorflow-hub==0.16.1
    - tensorflow-datasets==4.9.7

    # ── JAX (Colab ships JAX by default) ─────────────────────
    - jax[cuda12]          # or jax[cpu] for CPU

    # ── numpy re-pin (TF may upgrade it) ─────────────────────
    - numpy==1.26.4

    # ── ML ───────────────────────────────────────────────────
    - xgboost==2.1.4
    - lightgbm==4.6.0
    - catboost==1.2.8
    - shap==0.47.2
    - optuna==4.3.0
    - statsmodels==0.14.4
    - umap-learn==0.5.7

    # ── NLP ──────────────────────────────────────────────────
    - transformers==4.52.4
    - tokenizers==0.21.1
    - datasets==3.6.0
    - accelerate==1.6.0
    - sentence-transformers==3.4.1
    - spacy==3.7.5
    - nltk==3.9.1
    - sentencepiece==0.2.0
    - safetensors==0.5.3

    # ── CV ───────────────────────────────────────────────────
    - opencv-python-headless==4.11.0.86
    - albumentations==2.0.7
    - timm==1.0.15
    - ultralytics==8.3.100

    # ── Audio ────────────────────────────────────────────────
    - librosa==0.10.2
    - soundfile==0.12.1
    - pydub==0.25.1
    - speechbrain==1.0.2

    # ── RL ───────────────────────────────────────────────────
    - gymnasium==1.1.1
    - stable-baselines3==2.6.0

    # ── LLM ──────────────────────────────────────────────────
    - peft==0.15.2
    - trl==0.17.0
    - langchain==0.3.25
    - openai==1.86.0
    - google-genai==1.20.0
    - faiss-cpu==1.10.0

    # ── DL utilities ─────────────────────────────────────────
    - torchmetrics==1.7.1
    - lightning==2.5.0
    - timm==1.0.15
    - einops==0.8.1
    - mlflow==2.22.0
    - wandb==0.20.1
    - tensorboard==2.18.0
    - numba==0.60.0
    - llvmlite==0.43.0

    # ── Extras (Colab now ships these) ───────────────────────
    - gradio==5.31.0
    - duckdb==1.2.2
    - polars==1.21.0
    - plotly==6.0.1
    - rich==13.9.4

    # ── Jupyter ──────────────────────────────────────────────
    - jupyterlab==4.4.2
    - ipykernel==6.29.5
    - ipywidgets==8.1.5
    - ruff==0.11.12
    - tqdm==4.67.1
    - python-dotenv>=1.0.0
